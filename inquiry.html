<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의 의뢰 · AI교육컨설팅</title>
  <style>
    :root {
        --main-green: #2D4A37;
        --point-orange: #C26D48;
        --bg-cream: #FDF9F3;
    }
    body { font-size: 18px; color: var(--main-green); background: var(--bg-cream); margin: 0; font-family: sans-serif; }
    .nav { width: 100%; background: #FDF9F3; border-bottom: 1px solid #eee; height: 80px; display: flex; align-items: center; }
    .nav-inner { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; }
    .logo-area { display: flex; align-items: center; text-decoration: none; }
    .logo-dots { display: flex; gap: 4px; margin-right: 12px; }
    .logo-dots span { width: 7px; height: 7px; background-color: var(--point-orange) !important; border-radius: 50%; }
    .logo-text { font-size: 26px; font-weight: 900; color: #1a1a1a; letter-spacing: -1px; }
    .nav-links { display: flex !important; gap: 30px !important; align-items: center !important; }
    .nav-links a {
        text-decoration: none !important;
        color: #333 !important;
        font-size: 16px !important;
        font-weight: 500;
        white-space: nowrap !important;
    }
    .nav-links a:last-child {
        font-weight: 800 !important;
        border-bottom: 2px solid var(--main-green);
    }
    .calendar-card { background: white; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); padding: 50px; margin-top: 30px; text-align: center; }

    #cal-title, .cal-title {
        font-size: 38px !important;
        font-weight: 900 !important;
        color: #C26D48 !important;
        margin: 0 40px !important;
        display: inline-block !important;
    }

    .cal-nav { font-size: 30px; color: #BBB; cursor: pointer; user-select: none; padding: 0 20px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
    .calendar-day {
        font-size: 28px !important; font-weight: 900 !important; color: var(--main-green) !important;
        height: 72px; width: 72px; display: flex !important; align-items: center; justify-content: center;
        cursor: pointer !important; position: relative; border-radius: 50%; margin: 0 auto; transition: background-color 0.2s;
    }
    .calendar-day.selected { background-color: rgba(194, 109, 72, 0.25) !important; }
    .rank-badge { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; background: var(--main-green); color: white; border-radius: 50%; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .selected-list-card { margin-top: 30px; background: white; padding: 40px; border-radius: 15px; border: 1px solid #eee; text-align: center; }
    .rank-pill { background: var(--main-green); color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; margin-right: 15px; }
    .selected-item { width: 100%; max-width: 600px; margin: 0 auto; display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f5f5f5; font-size: 19px; font-weight: 600; }

    .submit-btn {
        background: var(--main-green);
        color: white;
        padding: 20px 45px;
        border-radius: 8px;
        font-size: 18px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: background 0.2s;
    }
    .submit-btn:hover { background: #1e3525; }
    @media (max-width: 600px) {
  .nav-links { display: none !important; }
  .nav-inner { padding: 0 20px !important; }
  .nav { height: 60px !important; }

  section { padding: 30px 15px !important; }
  h1 { font-size: 28px !important; }

  .calendar-card { padding: 20px 10px !important; border-radius: 12px !important; }

  #cal-title { font-size: 22px !important; margin: 0 15px !important; }
  .cal-nav { font-size: 22px !important; padding: 0 10px !important; }

  .cal-grid { gap: 4px !important; }
  .calendar-day { 
    width: 36px !important; 
    height: 36px !important; 
    font-size: 14px !important; 
  }

  .selected-list-card { padding: 20px 15px !important; }
  .selected-item { font-size: 16px !important; }

  .submit-btn { 
    width: 100% !important; 
    padding: 18px !important; 
    font-size: 16px !important; 
  }
}
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo-area">
          <div class="logo-dots"><span></span><span></span><span></span></div>
          <span class="logo-text">AI교육컨설팅</span>
      </a>
      <div class="nav-links">
          <a href="instructor-a.html">강사소개</a>
          <a href="index.html#cases">고객사례</a>
          <a href="index.html#programs">프로그램</a>
          <a href="inquiry.html" style="font-weight: 800; border-bottom: 2px solid #2D4A37;">강의의뢰</a>
      </div>
    </div>
  </nav>

  <section style="max-width: 900px; margin: 0 auto; padding: 60px 20px; text-align: center;">
    <h1 style="font-size: 42px; font-weight: 900; margin-bottom: 15px;">강의 희망일</h1>
    <div style="width: 40px; height: 3px; background: var(--main-green); margin: 0 auto 25px;"></div>

    <div class="calendar-card">
      <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 40px;">
        <span class="cal-nav" onclick="changeMonth(-1)">←</span>
        <p class="cal-title" id="cal-title">2026 · April</p>
        <span class="cal-nav" onclick="changeMonth(1)">→</span>
      </div>
      <div class="cal-grid" id="cal-grid">
        <div style="color:#BBB; font-weight:800; font-size: 14px;">SUN</div>
        <div style="color:#BBB; font-weight:800; font-size: 14px;">MON</div>
        <div style="color:#BBB; font-weight:800; font-size: 14px;">TUE</div>
        <div style="color:#BBB; font-weight:800; font-size: 14px;">WED</div>
        <div style="color:#BBB; font-weight:800; font-size: 14px;">THU</div>
        <div style="color:#BBB; font-weight:800; font-size: 14px;">FRI</div>
        <div style="color:#BBB; font-weight:800; font-size: 14px;">SAT</div>
      </div>
    </div>

    <div class="selected-list-card">
      <div id="selected-list">
        <p style="color: #BBB;">달력에서 최대 3개 날짜를 골라주세요</p>
      </div>
    </div>

    <div style="margin-top: 50px; display: flex; justify-content: space-between; align-items: center;">
      <a href="index.html" style="color: #888; text-decoration: none;">← 메인으로</a>
      <button class="submit-btn" onclick="goToForm()">
        의뢰 정보 남기기 →
      </button>
    </div>
  </section>

  <script>
    let currentYear = 2026;
    let currentMonth = 3;
    let selectedDates = [];

    const MIN_YEAR = 2026, MIN_MONTH = 3;
    const MAX_YEAR = 2027, MAX_MONTH = 11;

    function renderCalendar() {
      const grid = document.getElementById('cal-grid');
      const title = document.getElementById('cal-title');
      const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

      title.innerText = `${currentYear} · ${months[currentMonth]}`;

      const days = grid.querySelectorAll('.calendar-day, .empty-day');
      days.forEach(d => d.remove());

      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'empty-day';
        grid.appendChild(emptyDiv);
      }

      for (let d = 1; d <= lastDate; d++) {
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';
        dayDiv.innerText = d;
        dayDiv.onclick = () => toggleDate(d, dayDiv);
        grid.appendChild(dayDiv);
      }

      updateUI();
    }

    function changeMonth(n) {
      let nextMonth = currentMonth + n;
      let nextYear = currentYear;

      if (nextMonth > 11) { nextMonth = 0; nextYear++; }
      else if (nextMonth < 0) { nextMonth = 11; nextYear--; }

      if (nextYear < MIN_YEAR || (nextYear === MIN_YEAR && nextMonth < MIN_MONTH)) return;
      if (nextYear > MAX_YEAR || (nextYear === MAX_YEAR && nextMonth > MAX_MONTH)) return;

      currentMonth = nextMonth;
      currentYear = nextYear;
      renderCalendar();
    }

    function toggleDate(day, element) {
      const dateId = `${currentYear}-${currentMonth + 1}-${day}`;
      const index = selectedDates.findIndex(item => item.id === dateId);
      if (index > -1) {
        selectedDates.splice(index, 1);
      } else {
        if (selectedDates.length >= 3) return;
        selectedDates.push({ id: dateId, y: currentYear, m: currentMonth + 1, d: day });
      }
      updateUI();
    }

    function updateUI() {
      document.querySelectorAll('.calendar-day').forEach(div => {
        const day = parseInt(div.innerText);
        const dateId = `${currentYear}-${currentMonth + 1}-${day}`;
        const rank = selectedDates.findIndex(item => item.id === dateId);
        const oldBadge = div.querySelector('.rank-badge');
        if (oldBadge) oldBadge.remove();
        div.classList.remove('selected');
        if (rank > -1) {
          div.classList.add('selected');
          const badge = document.createElement('div');
          badge.className = 'rank-badge';
          badge.innerText = rank + 1;
          div.appendChild(badge);
        }
      });

      const listDiv = document.getElementById('selected-list');
      if (selectedDates.length > 0) {
        listDiv.innerHTML = '<p style="text-align:left; font-weight:800; margin-bottom:20px; color:#2D4A37;">선택하신 날짜</p>';
        selectedDates.forEach((item, i) => {
          listDiv.innerHTML += `<div class="selected-item"><span class="rank-pill">${i + 1}순위</span> <span>${item.y}년 ${item.m}월 ${item.d}일</span></div>`;
        });
      } else {
        listDiv.innerHTML = '<p style="color: #BBB;">달력에서 최대 3개 날짜를 골라주세요</p>';
      }
    }

    // 폼 페이지로 이동 (선택한 날짜 정보 함께)
    function goToForm() {
      if (selectedDates.length === 0) {
        alert('최소 1개 이상의 희망일을 선택해주세요.');
        return;
      }
      localStorage.setItem('selectedDates', JSON.stringify(selectedDates));
      window.location.href = 'inquiry-form.html';
    }

    document.addEventListener('DOMContentLoaded', renderCalendar);
  </script>
</body>
</html>
